// ── AUDIO ─────────────────────────────────────────────────────────────────────
function useAudio() {
  const ctxRef = useRef(null);
  const getCtx = useCallback(() => {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  }, []);

  const beep = useCallback((freq=880, dur=0.12, vol=0.4, type="sine", delay=0) => {
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.05);
    } catch(e){}
  }, [getCtx]);

  // Short high pip – "start holding"
  const beepStart = useCallback(() => { beep(880, 0.1, 0.5); }, [beep]);
  // Low thud – "release"
  const beepEnd = useCallback(() => { beep(440, 0.15, 0.5); }, [beep]);
  // Double pip – "rest done, get ready"
  const beepReady = useCallback(() => { beep(660, 0.08, 0.4, "sine", 0); beep(880, 0.1, 0.5, "sine", 0.12); }, [beep]);
  // Triple ascending – exercise complete
  const beepDone = useCallback(() => { beep(660,0.1,0.4,"sine",0); beep(880,0.1,0.4,"sine",0.15); beep(1100,0.18,0.5,"sine",0.3); }, [beep]);
  // Countdown tick
  const beepTick = useCallback(() => { beep(550, 0.06, 0.25, "sine"); }, [beep]);

  return { beepStart, beepEnd, beepReady, beepDone, beepTick };
}

      <g>
        <rect x="72" y="54" width="50" height="28" rx="12" fill={c} transform="rotate(22,98,68)"/>
        <ellipse cx="95" cy="60" rx="14" ry="10" fill={c}/>
        <rect x="48" y="52" width="14" height="48" rx="7" fill={c} transform="rotate(18,56,52)"/>
        <rect x="110" y="52" width="13" height="48" rx="6" fill={dim} transform="rotate(18,116,52)"/>
        <rect x="46" y="98" width="13" height="40" rx="6" fill={c} transform="rotate(-16,52,98)"/>
        <rect x="108" y="98" width="12" height="40" rx="6" fill={dim} transform="rotate(-16,114,98)"/>
        <ellipse cx="52" cy="194" rx="14" ry="8" fill={c}/>
        <ellipse cx="116" cy="194" rx="13" ry="8" fill={dim}/>
        <ellipse cx="74" cy="36" rx="19" ry="21" fill={c}/>
        <rect x="84" y="54" width="13" height="15" rx="6" fill={c}/>
        <animateTransform attributeName="transform" type="translate"
          values="0,0;0,36;0,0" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );
  return null;
}

// ── TIMER RING ────────────────────────────────────────────────────────────────
function TimerRing({ total, remaining, color, phase }) {
  const r = 54;
  const circ = 2 * Math.PI * r;
  const progress = total > 0 ? remaining / total : 0;
  const dash = circ * progress;
  const isRest = phase === "repRest" || phase === "setRest";

  return (
    <div style={{ position:"relative", width:140, height:140, flexShrink:0 }}>
      {/* Ripple when last 3 seconds of rest */}
      {isRest && remaining <= 3 && remaining > 0 && (
        <div className="ripple-ring" style={{
          position:"absolute", top:10, left:10, width:120, height:120,
          borderRadius:"50%", border:`2px solid ${color}`,
        }}/>
      )}
      <svg width="140" height="140" style={{ transform:"rotate(-90deg)" }}>
        {/* Track */}
        <circle cx="70" cy="70" r={r} fill="none" stroke="#1a1a22" strokeWidth="8"/>
        {/* Progress */}
        <circle cx="70" cy="70" r={r} fill="none"
          stroke={isRest ? "#3a3a52" : color}
          strokeWidth="8"
          strokeLinecap="round"
          strokeDasharray={`${dash} ${circ}`}
          style={{ transition: "stroke-dasharray 0.9s linear" }}
        />
      </svg>
      {/* Center text */}
      <div style={{
        position:"absolute", inset:0, display:"flex",
        flexDirection:"column", alignItems:"center", justifyContent:"center",
      }}>
        <span style={{
          fontSize: remaining > 9 ? 36 : 40,
          fontFamily:"'Courier New',monospace",
          color: isRest ? "#3a3a6a" : color,
          lineHeight:1,
          className: remaining <= 3 && !isRest ? "pulsing" : "",
        }}>
          {remaining}
        </span>
        <span style={{
          fontSize:10, fontFamily:"'Courier New',monospace",
          color:"#2e2e4a", marginTop:3, letterSpacing:"0.1em",
        }}>
          {isRest ? "PAUSE" : "SEK"}
        </span>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [weekIdx, setWeekIdx] = useState(() => Math.min(parseInt(localStorage.getItem("wk_week")||"0"),3));
  const [totalWorkouts, setTotalWorkouts] = useState(() => parseInt(localStorage.getItem("wk_total")||"0"));
  const [weekUnlocked, setWeekUnlocked] = useState(false);

  // workout state
  const [exIdx, setExIdx] = useState(0);
  const [setsDone, setSetsDone] = useState(0);
  const [currentRep, setCurrentRep] = useState(1);
  const [phase, setPhase] = useState("hold"); // hold | repRest | setRest | ready
  const [countdown, setCountdown] = useState(0);
  const [totalTime, setTotalTime] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [showIntro, setShowIntro] = useState(true);

  const intervalRef = useRef(null);
  const audio = useAudio();

  const save = (t,w) => { localStorage.setItem("wk_week",String(w)); localStorage.setItem("wk_total",String(t)); };

  const ex = EX[exIdx] || EX[0];
  const prog = WEEKS[weekIdx]?.data[exIdx] || WEEKS[0].data[0];
  const wkd = WEEKS[weekIdx];
  const nextIn = weekIdx < 3 ? 5 - (totalWorkouts % 5) : null;

  // Start a phase
  const startPhase = useCallback((ph, dur) => {
    setPhase(ph);
    setCountdown(dur);
    setTotalTime(dur);
    setTimerRunning(true);
    if (ph === "hold") audio.beepStart();
    else if (ph === "repRest" || ph === "setRest") audio.beepEnd();
    else if (ph === "ready") audio.beepReady();
  }, [audio]);

  // Advance to next rep / set / exercise
  const advanceAfterRest = useCallback((currentExIdx, currentSetsDone, currentRep, prog) => {
    const totalReps = prog.reps;
    const totalSets = prog.sets;
    if (currentRep < totalReps) {
      // next rep same set
      setCurrentRep(r => r + 1);
      startPhase("hold", prog.hold);
    } else if (currentSetsDone + 1 < totalSets) {
      // next set
      setSetsDone(s => s + 1);
      setCurrentRep(1);
      startPhase("hold", prog.hold);
    } else {
      // exercise done
      if (currentExIdx + 1 < EX.length) {
        audio.beepDone();
        setTimerRunning(false);
        setExIdx(e => e + 1);
        setSetsDone(0);
        setCurrentRep(1);
        setPhase("hold");
        setShowIntro(true);
      } else {
        // all done
        audio.beepDone();
        setTimerRunning(false);
        const nt = totalWorkouts + 1;
        const nw = Math.min(Math.floor(nt / 5), 3);
        const ul = nw > weekIdx;
        setTotalWorkouts(nt);
        setWeekIdx(nw);
        setWeekUnlocked(ul);
        save(nt, nw);
        setScreen("complete");
      }
    }
  }, [audio, totalWorkouts, weekIdx]);

  // Timer tick
  useEffect(() => {
    if (!timerRunning) return;
    intervalRef.current = setInterval(() => {
      setCountdown(c => {
        if (c <= 1) {
          clearInterval(intervalRef.current);
          return 0;
        }
        if (c <= 4 && (phase === "repRest" || phase === "setRest")) audio.beepTick();
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [timerRunning, phase, audio]);

  // React to countdown hitting 0
  useEffect(() => {
    if (!timerRunning || countdown !== 0) return;
    setTimerRunning(false);
    if (phase === "hold") {
      const totalReps = prog.reps;
      const totalSets = prog.sets;
      if (currentRep < totalReps) {
        startPhase("repRest", prog.repRest);
      } else if (setsDone + 1 < totalSets) {
        startPhase("setRest", prog.setRest);
      } else if (exIdx + 1 < EX.length) {
        audio.beepDone();
        setExIdx(e => e + 1);
        setSetsDone(0);
        setCurrentRep(1);
        setPhase("hold");
        setShowIntro(true);
      } else {
        audio.beepDone();
        const nt = totalWorkouts + 1;
        const nw = Math.min(Math.floor(nt / 5), 3);
        const ul = nw > weekIdx;
        setTotalWorkouts(nt);
        setWeekIdx(nw);
        setWeekUnlocked(ul);
        save(nt, nw);
        setScreen("complete");
      }
    } else if (phase === "repRest") {
      audio.beepReady();
      setCurrentRep(r => r + 1);
      startPhase("hold", prog.hold);
    } else if (phase === "setRest") {
      audio.beepReady();
      setSetsDone(s => s + 1);
      setCurrentRep(1);
      startPhase("hold", prog.hold);
    }
  }, [countdown, timerRunning]);

  const startWorkout = () => {
    setExIdx(0); setSetsDone(0); setCurrentRep(1);
    setPhase("hold"); setShowIntro(true);
    setTimerRunning(false);
    setScreen("workout");
  };

  const startCurrentExercise = () => {
    setShowIntro(false);
    startPhase("hold", prog.hold);
  };

  const skipRest = () => {
    if (phase !== "repRest" && phase !== "setRest") return;
    clearInterval(intervalRef.current);
    setTimerRunning(false);
    audio.beepReady();
    if (phase === "repRest") {
      setCurrentRep(r => r + 1);
      startPhase("hold", prog.hold);
    } else {
      setSetsDone(s => s + 1);
      setCurrentRep(1);
      startPhase("hold", prog.hold);
    }
  };

  const abortWorkout = () => {
    clearInterval(intervalRef.current);
    setTimerRunning(false);
    setScreen("home");
  };

  const isRest = phase === "repRest" || phase === "setRest";
  const phaseLabel = phase === "hold" ? "HALTEN" : phase === "repRest" ? "PAUSE" : phase === "setRest" ? "SATZPAUSE" : "";

  // ── HOME ──
  if (screen === "home") return (
    <div style={{ minHeight:"100vh", background:"#0a0a0c", color:"#e8e6e1", fontFamily:"Georgia,serif", display:"flex", flexDirection:"column" }}>
      <div style={{ padding:"44px 22px 22px", background:"linear-gradient(180deg,#0c0f1c,#0a0a0c)" }}>
        <p style={{ fontFamily:"'Courier New',monospace", fontSize:11, letterSpacing:"0.22em", color:"#2e2e4a", textTransform:"uppercase", marginBottom:8 }}>Morgenroutine · Täglich · 10–15 Min</p>
        <h1 style={{ fontSize:32, fontWeight:"normal", letterSpacing:"-0.5px", margin:"0 0 14px" }}>Core &amp; Haltung</h1>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ background:"#141428", border:"1px solid #2a2a4e", borderRadius:8, padding:"6px 12px" }}>
            <span style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#6eb5ff" }}>{wkd.label}</span>
          </div>
          <span style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#2e2e4a" }}>{wkd.desc}</span>
        </div>
        {nextIn && <p style={{ fontFamily:"'Courier New',monospace", fontSize:10, color:"#2a2a3a", marginTop:8 }}>{totalWorkouts} absolviert · Woche {weekIdx+2} in {nextIn} Training{nextIn!==1?"s":""}</p>}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"4px 16px" }}>
        {EX.map((e,i) => { const p = WEEKS[weekIdx].data[i]; return (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 0", borderBottom:"1px solid #111114" }}>
            <div style={{ width:38, height:38, borderRadius:"50%", background:e.color+"14", display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{e.emoji}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, marginBottom:2 }}>{e.name}</div>
              <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#3a3a52" }}>{p.sets} × {p.reps} Wdh. · {p.hold}s halten · {p.setRest}s Pause</div>
            </div>
            {p.v !== "Basis" && <div style={{ background:e.color+"12", border:`1px solid ${e.color}28`, borderRadius:6, padding:"2px 8px", fontSize:10, color:e.color, fontFamily:"'Courier New',monospace", flexShrink:0 }}>{p.v}</div>}
          </div>
        );})}
      </div>
      <div style={{ padding:"16px 20px 36px" }}>
        <button onClick={startWorkout} style={{ width:"100%", padding:"15px", background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)", border:"none", borderRadius:12, color:"#08080a", fontSize:14, fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", fontWeight:"bold", cursor:"pointer" }}>
          TRAINING STARTEN →
        </button>
      </div>
    </div>
  );

  // ── WORKOUT ──
  if (screen === "workout") return (
    <div style={{ minHeight:"100vh", background:"#0a0a0c", color:"#e8e6e1", fontFamily:"Georgia,serif", display:"flex", flexDirection:"column" }}>
      {/* Progress bar */}
      <div style={{ height:3, background:"#0f0f12" }}>
        <div style={{ height:"100%", width:`${(exIdx / EX.length) * 100}%`, background:`linear-gradient(90deg,${ex.color},${ex.color}88)`, transition:"width 0.4s ease" }}/>
      </div>

      {/* Top nav */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 22px 0" }}>
        <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#2e2e4a" }}>
          {exIdx+1} / {EX.length} · Satz {setsDone+1}/{prog.sets} · Wdh {currentRep}/{prog.reps}
        </div>
        <button onClick={abortWorkout} style={{ background:"none", border:"none", color:"#2e2e4a", fontFamily:"'Courier New',monospace", fontSize:11, cursor:"pointer", padding:"4px 8px" }}>✕</button>
      </div>

      {/* Figure */}
      <div style={{ height:180, width:"100%", maxWidth:300, margin:"12px auto 0", padding:"0 20px" }}>
        <Figure id={exIdx} color={ex.color}/>
      </div>

      {/* Exercise info */}
      <div style={{ padding:"8px 22px 0" }}>
        <div style={{ display:"inline-block", background:ex.color+"14", border:`1px solid ${ex.color}28`, borderRadius:20, padding:"3px 12px", fontFamily:"'Courier New',monospace", fontSize:10, color:ex.color, marginBottom:6 }}>{ex.cat}</div>
        <h2 style={{ fontSize:22, fontWeight:"normal", margin:"0 0 4px" }}>{ex.emoji} {ex.name}</h2>
        {prog.v !== "Basis" && (
          <div style={{ background:"#161400", border:"1px solid #2e2800", borderRadius:8, padding:"6px 12px", fontFamily:"'Courier New',monospace", fontSize:11, color:"#c9a22a", marginBottom:6, lineHeight:1.5 }}>
            ↑ {prog.v}{prog.h ? <span style={{ color:"#5a4e1a", marginLeft:6 }}>{prog.h}</span> : null}
          </div>
        )}
        <p style={{ fontSize:13, lineHeight:1.6, color:"#5a5868", marginBottom:4 }}>{ex.desc}</p>
        <div style={{ background:"#0e0e11", borderLeft:`3px solid ${ex.color}30`, borderRadius:"0 6px 6px 0", padding:"8px 12px", fontSize:12, color:"#404050", fontStyle:"italic", lineHeight:1.5 }}>{ex.tip}</div>
      </div>

      {/* Spacer */}
      <div style={{ flex:1 }}/>

      {/* INTRO screen before exercise starts */}
      {showIntro ? (
        <div style={{ padding:"16px 22px 34px", display:"flex", flexDirection:"column", alignItems:"center", gap:12 }}>
          <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#3a3a5a", letterSpacing:"0.1em" }}>
            {prog.sets} Sätze · {prog.reps} Wdh. · {prog.hold}s halten · {prog.repRest}s Pause · {prog.setRest}s Satzpause
          </div>
          <button onClick={startCurrentExercise} style={{ width:"100%", padding:"16px", background:ex.color, border:"none", borderRadius:12, color:"#08080a", fontSize:14, fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", fontWeight:"bold", cursor:"pointer" }}>
            ÜBUNG STARTEN →
          </button>
        </div>
      ) : (
        /* TIMER UI */
        <div style={{ padding:"12px 22px 30px" }}>
          {/* Phase label */}
          <div style={{ textAlign:"center", fontFamily:"'Courier New',monospace", fontSize:11, letterSpacing:"0.15em", color: isRest ? "#3a3a5a" : ex.color, marginBottom:10 }}>
            {phaseLabel}
          </div>

          {/* Timer ring + set dots */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:20 }}>
            <TimerRing total={totalTime} remaining={countdown} color={ex.color} phase={phase}/>

            {/* Rep + set indicators */}
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <div style={{ fontFamily:"'Courier New',monospace", fontSize:10, color:"#2a2a3a", letterSpacing:"0.08em", marginBottom:2 }}>SÄTZE</div>
              {Array.from({ length: prog.sets }).map((_,i) => (
                <div key={i} style={{ width:28, height:8, borderRadius:4, background: i < setsDone ? ex.color : i === setsDone ? ex.color+"50" : "#161618", transition:"background 0.3s" }}/>
              ))}
              <div style={{ fontFamily:"'Courier New',monospace", fontSize:10, color:"#2a2a3a", letterSpacing:"0.08em", marginTop:6 }}>WDH {currentRep}/{prog.reps}</div>
            </div>
          </div>

          {/* Skip rest button */}
          {isRest && (
            <button onClick={skipRest} style={{ width:"100%", marginTop:12, padding:"12px", background:"transparent", border:`1px solid #2a2a3a`, borderRadius:10, color:"#3a3a5a", fontSize:12, fontFamily:"'Courier New',monospace", letterSpacing:"0.08em", cursor:"pointer" }}>
              PAUSE ÜBERSPRINGEN →
            </button>
          )}
        </div>
      )}
    </div>
  );

  // ── COMPLETE ──
  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0c", color:"#e8e6e1", fontFamily:"Georgia,serif", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:28, textAlign:"center" }}>
      <div style={{ fontSize:52, marginBottom:14, lineHeight:1 }}>✓</div>
      <h1 style={{ fontSize:26, fontWeight:"normal", margin:"0 0 6px" }}>Workout abgeschlossen</h1>
      <p style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#2e2e4a", marginBottom:28 }}>{totalWorkouts} Training{totalWorkouts!==1?"s":""} insgesamt</p>
      {weekUnlocked && weekIdx <= 3 && (
        <div style={{ background:"#091409", border:"1px solid #142814", borderRadius:12, padding:"16px 22px", marginBottom:22, width:"100%", maxWidth:320 }}>
          <div style={{ fontFamily:"'Courier New',monospace", fontSize:10, color:"#3a6e3a", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>Neue Stufe freigeschaltet</div>
          <div style={{ fontSize:16, color:"#86efac", marginBottom:4 }}>{WEEKS[weekIdx].label}</div>
          <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#3a5a3a" }}>{WEEKS[weekIdx].desc}</div>
        </div>
      )}
      <div style={{ background:"#0e0e11", border:"1px solid #161618", borderRadius:12, padding:"16px 20px", width:"100%", maxWidth:320, marginBottom:24, textAlign:"left" }}>
        <div style={{ fontFamily:"'Courier New',monospace", fontSize:10, color:"#2a2a3a", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8 }}>Aktuell</div>
        <div style={{ fontSize:14, color:"#888", marginBottom:4 }}>{WEEKS[weekIdx].label} · {WEEKS[weekIdx].desc}</div>
        {nextIn ? <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#2e2e4a" }}>Woche {weekIdx+2} in {nextIn} Training{nextIn!==1?"s":""}</div>
                : <div style={{ fontFamily:"'Courier New',monospace", fontSize:11, color:"#2e2e4a" }}>Maximum erreicht 🏆</div>}
      </div>
      <button onClick={() => setScreen("home")} style={{ padding:"14px 36px", background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)", border:"none", borderRadius:12, color:"#08080a", fontSize:12, fontFamily:"'Courier New',monospace", letterSpacing:"0.1em", fontWeight:"bold", cursor:"pointer" }}>
        ZUR ÜBERSICHT
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker" in navigator){ navigator.serviceWorker.register("/workout/sw.js"); }</script>
