<script type="text/babel">

const EX = [
  {name:"Chin Tuck",     emoji:"🎯",color:"#6eb5ff",cat:"Kopfhaltung",
   desc:"Kinnspitze gerade nach hinten ziehen – kein Nicken. Wie ein Doppelkinn. Halten, lösen.",

   desc:"Rücken flach an Wand. Arme in W-Position (Ellbogen 90°), langsam zu Y schieben. Kontakt halten.",
   tip:"Lendenwirbel zur Wand – das ist die eigentliche Herausforderung."},
  {name:"YTW-Raise",     emoji:"⬆️",color:"#a78bfa",cat:"Rückenbreite",

   tip:"Schulterblätter zusammenziehen und nach unten – nicht mit dem Nacken kompensieren."},
  {name:"Bird Dog",      emoji:"🐕",color:"#86efac",cat:"Core & Rücken",

   tip:"Glas Wasser auf dem Rücken vorstellen – es darf nicht kippen."},
  {name:"Dead Bug",      emoji:"🪲",color:"#6ee7b7",cat:"Core & LWS",

   tip:"Lendenwirbel aktiv in den Boden drücken – sobald er sich hebt, zu weit gegangen."},
  {name:"Glute Bridge",  emoji:"🌉",color:"#fb7185",cat:"Beckenboden",

  {name:"Pike Push-up",  emoji:"🔺",color:"#c084fc",cat:"Schultern",

const ks = "0.45 0 0.55 1; 0.45 0 0.55 1";
const kt = "0; 0.5; 1";

}

function App() {
  const [screen, setScreen] = useState("home");
  const [weekIdx, setWeekIdx] = useState(() => Math.min(parseInt(localStorage.getItem("wk_week")||"0"),3));
  const [totalWorkouts, setTotalWorkouts] = useState(() => parseInt(localStorage.getItem("wk_total")||"0"));
  const [exIdx, setExIdx] = useState(0);
  const [setsDone, setSetsDone] = useState(0);
  const [weekUnlocked, setWeekUnlocked] = useState(false);

  const save = (t, w) => {
    localStorage.setItem("wk_week", String(w));
    localStorage.setItem("wk_total", String(t));
  };

  const startWorkout = () => { setExIdx(0); setSetsDone(0); setScreen("workout"); };

  const advance = () => {
    const prog = WEEKS[weekIdx].data[exIdx];
    if (setsDone + 1 < prog.sets) {
      setSetsDone(s => s + 1);
    } else if (exIdx + 1 < EX.length) {
      setExIdx(e => e + 1);
      setSetsDone(0);
    } else {
      const newTotal = totalWorkouts + 1;
      const newWeek = Math.min(Math.floor(newTotal / 5), 3);
      const unlocked = newWeek > weekIdx;
      setTotalWorkouts(newTotal);
      setWeekIdx(newWeek);
      setWeekUnlocked(unlocked);
      save(newTotal, newWeek);
      setScreen("complete");
    }
  };

  const ex = EX[exIdx] || EX[0];
  const prog = WEEKS[weekIdx]?.data[exIdx] || WEEKS[0].data[0];
  const weekData = WEEKS[weekIdx];
  const nextUnlockIn = weekIdx < 3 ? 5 - (totalWorkouts % 5) : null;

  const base = {
    minHeight:"100vh", background:"#0a0a0c", color:"#e8e6e1",
    fontFamily:"Georgia,serif", display:"flex", flexDirection:"column",
  };

  if (screen === "home") return (
    <div style={base}>
      <div style={{padding:"44px 22px 22px",background:"linear-gradient(180deg,#0c0f1c,#0a0a0c)"}}>
        <p style={{fontFamily:"'Courier New',monospace",fontSize:11,letterSpacing:"0.22em",color:"#2e2e4a",textTransform:"uppercase",marginBottom:8}}>
          Morgenroutine · Täglich · 10–15 Min
        </p>
        <h1 style={{fontSize:32,fontWeight:"normal",letterSpacing:"-0.5px",margin:"0 0 14px"}}>
          Core &amp; Haltung
        </h1>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"#141428",border:"1px solid #2a2a4e",borderRadius:8,padding:"6px 12px"}}>
            <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#6eb5ff"}}>{weekData.label}</span>
          </div>
          <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>{weekData.desc}</span>
        </div>
        {nextUnlockIn && (
          <p style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#2a2a3a",marginTop:8}}>
            {totalWorkouts} absolviert · Woche {weekIdx+2} in {nextUnlockIn} Training{nextUnlockIn!==1?"s":""}
          </p>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"4px 16px"}}>
        {EX.map((e,i) => {
          const p = WEEKS[weekIdx].data[i];
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:"1px solid #111114"}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:e.color+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
                {e.emoji}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,marginBottom:2}}>{e.name}</div>
                <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#3a3a52"}}>
                  {p.sets} × {p.reps} · {p.tempo}
                </div>
              </div>
              {p.v !== "Basis" && (
                <div style={{background:e.color+"12",border:`1px solid ${e.color}28`,borderRadius:6,padding:"2px 8px",fontSize:10,color:e.color,fontFamily:"'Courier New',monospace",flexShrink:0}}>
                  {p.v}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{padding:"16px 20px 36px"}}>
        <button onClick={startWorkout} style={{
          width:"100%",padding:"15px",
          background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)",
          border:"none",borderRadius:12,color:"#08080a",
          fontSize:14,fontFamily:"'Courier New',monospace",
          letterSpacing:"0.1em",fontWeight:"bold",cursor:"pointer",
        }}>
          TRAINING STARTEN →
        </button>
      </div>
    </div>
  );

  if (screen === "workout") return (
    <div style={{...base,padding:0}}>
      <div style={{height:3,background:"#0f0f12"}}>
        <div style={{
          height:"100%",
          width:`${((exIdx + setsDone/prog.sets) / EX.length) * 100}%`,
          background:`linear-gradient(90deg,${ex.color},${ex.color}88)`,
          transition:"width 0.4s ease",
        }}/>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px 0"}}>
        <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>
          {exIdx+1} / {EX.length}
        </span>
        <button onClick={() => setScreen("home")} style={{background:"none",border:"none",color:"#2e2e4a",fontFamily:"'Courier New',monospace",fontSize:11,cursor:"pointer",padding:"4px 8px"}}>
          ✕ Abbrechen
        </button>
      </div>

      <div style={{height:190,width:"100%",maxWidth:300,margin:"14px auto 0"}}>
        <Figure id={exIdx} color={ex.color}/>
      </div>

      <div style={{padding:"10px 22px",flex:1,overflowY:"auto"}}>
        <div style={{display:"inline-block",background:ex.color+"14",border:`1px solid ${ex.color}28`,borderRadius:20,padding:"3px 12px",fontFamily:"'Courier New',monospace",fontSize:10,color:ex.color,marginBottom:10}}>
          {ex.cat}
        </div>
        <h2 style={{fontSize:26,fontWeight:"normal",letterSpacing:"-0.3px",margin:"0 0 10px"}}>
          {ex.emoji} {ex.name}
        </h2>
        {prog.v !== "Basis" && (
          <div style={{background:"#161400",border:"1px solid #2e2800",borderRadius:8,padding:"8px 12px",fontFamily:"'Courier New',monospace",fontSize:11,color:"#c9a22a",marginBottom:10,lineHeight:1.5}}>
            ↑ {prog.v}{prog.h ? <span style={{color:"#5a4e1a",marginLeft:6}}>{prog.h}</span> : null}
          </div>
        )}
        <div style={{display:"flex",gap:5,margin:"12px 0 10px"}}>
          {Array.from({length:prog.sets}).map((_,i) => (
            <div key={i} style={{height:4,flex:1,borderRadius:2,background:i<setsDone?ex.color:i===setsDone?ex.color+"50":"#161618",transition:"background 0.3s"}}/>
          ))}
        </div>
        <div style={{fontFamily:"'Courier New',monospace",fontSize:13,color:ex.color,marginBottom:12}}>
          Satz {setsDone+1} von {prog.sets} · {prog.reps} Wdh. · {prog.tempo}
        </div>
        <p style={{fontSize:14,lineHeight:1.7,color:"#7a7888",marginBottom:10}}>{ex.desc}</p>
        <div style={{background:"#0e0e11",borderLeft:`3px solid ${ex.color}35`,borderRadius:"0 8px 8px 0",padding:"10px 14px",fontSize:13,color:"#50505e",fontStyle:"italic",lineHeight:1.55}}>
          {ex.tip}
        </div>
      </div>

      <div style={{padding:"14px 20px 34px"}}>
        <button onClick={advance} style={{
          width:"100%",padding:"15px",
          background:ex.color,border:"none",borderRadius:12,
          color:"#08080a",fontSize:13,
          fontFamily:"'Courier New',monospace",
          letterSpacing:"0.08em",fontWeight:"bold",cursor:"pointer",
        }}>
          {setsDone+1 < prog.sets
            ? `SATZ ${setsDone+1} ERLEDIGT →`
            : exIdx+1 < EX.length
              ? "ÜBUNG ABGESCHLOSSEN →"
              : "WORKOUT ABGESCHLOSSEN ✓"}
        </button>
      </div>
    </div>
  );

  return (
    <div style={{...base,alignItems:"center",justifyContent:"center",padding:28,textAlign:"center"}}>
      <div style={{fontSize:52,marginBottom:14,lineHeight:1}}>✓</div>
      <h1 style={{fontSize:26,fontWeight:"normal",margin:"0 0 6px"}}>Workout abgeschlossen</h1>
      <p style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a",marginBottom:28}}>
        {totalWorkouts} Training{totalWorkouts!==1?"s":""} insgesamt
      </p>
      {weekUnlocked && weekIdx <= 3 && (
        <div style={{background:"#091409",border:"1px solid #142814",borderRadius:12,padding:"16px 22px",marginBottom:22,width:"100%",maxWidth:320}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#3a6e3a",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Neue Stufe freigeschaltet</div>
          <div style={{fontSize:16,color:"#86efac",marginBottom:4}}>{WEEKS[weekIdx].label}</div>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#3a5a3a"}}>{WEEKS[weekIdx].desc}</div>
        </div>
      )}
      <div style={{background:"#0e0e11",border:"1px solid #161618",borderRadius:12,padding:"16px 20px",width:"100%",maxWidth:320,marginBottom:24,textAlign:"left"}}>
        <div style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#2a2a3a",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Aktuell</div>
        <div style={{fontSize:14,color:"#888",marginBottom:4}}>{WEEKS[weekIdx].label} · {WEEKS[weekIdx].desc}</div>
        {nextUnlockIn
          ? <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>Woche {weekIdx+2} in {nextUnlockIn} Training{nextUnlockIn!==1?"s":""}</div>
          : <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>Maximum erreicht 🏆</div>
        }
      </div>
      <button onClick={() => setScreen("home")} style={{
        padding:"14px 36px",
        background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)",
        border:"none",borderRadius:12,color:"#08080a",
        fontSize:12,fontFamily:"'Courier New',monospace",
        letterSpacing:"0.1em",fontWeight:"bold",cursor:"pointer",
      }}>
        ZUR ÜBERSICHT
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
