// ── FIGURE COMPONENT ─────────────────────────────────────────────────────────
function Figure({ id, color }) {
  const c = color;
  const dim = color + "68";
  const ks = "0.45 0 0.55 1;0.45 0 0.55 1";
  const kt = "0;0.5;1";
  const sv = { width:"100%", height:"100%", overflow:"visible" };

  // ── 0: CHIN TUCK — side profile, head translates back ──────────────────
  if (id === 0) return (
    <svg viewBox="0 0 160 235" style={sv}>
      {/* floor */}
      <line x1="20" x2="140" y1="223" y2="223" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>
      {/* back arm */}
      <rect x="84" y="67" width="14" height="36" rx="7" fill={dim}/>
      <rect x="85" y="101" width="12" height="30" rx="6" fill={dim}/>
      {/* back leg */}
      <rect x="76" y="133" width="17" height="46" rx="8" fill={dim}/>
      <rect x="77" y="177" width="14" height="42" rx="7" fill={dim}/>
      <ellipse cx="85" cy="219" rx="24" ry="9" fill={dim}/>
      {/* torso (side view) */}
      <rect x="60" y="59" width="28" height="60" rx="13" fill={c}/>
      {/* pelvis */}
      <rect x="58" y="115" width="34" height="22" rx="11" fill={c}/>
      {/* pec/shoulder bump */}
      <ellipse cx="61" cy="72" rx="10" ry="7" fill={c}/>
      {/* front arm */}
      <rect x="42" y="67" width="14" height="36" rx="7" fill={c}/>
      <rect x="43" y="101" width="12" height="30" rx="6" fill={c}/>
      {/* front leg */}
      <rect x="64" y="133" width="17" height="46" rx="8" fill={c}/>
      <rect x="65" y="177" width="14" height="42" rx="7" fill={c}/>
      <ellipse cx="73" cy="219" rx="24" ry="9" fill={c}/>
      {/* neck */}
      <rect x="66" y="46" width="15" height="17" rx="7" fill={c}/>
      {/* animated head + top neck */}
      <g>
        <ellipse cx="77" cy="27" rx="20" ry="22" fill={c}/>
        {/* ear */}
        <ellipse cx="57" cy="27" rx="5" ry="7" fill={c}/>
        {/* chin direction indicator - subtle */}
        <animateTransform attributeName="transform" type="translate"
          values="0,0;-11,0;0,0" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 1: WALL ANGELS — front view, arms W→Y ──────────────────────────────
  if (id === 1) return (
    <svg viewBox="0 0 220 240" style={sv}>
      {/* wall */}
      <rect x="193" y="0" width="9" height="240" rx="3" fill={dim} opacity="0.4"/>
      {/* floor */}
      <line x1="20" x2="190" y1="232" y2="232" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>
      {/* legs */}
      <rect x="72" y="134" width="22" height="48" rx="10" fill={c}/>
      <rect x="74" y="180" width="18" height="44" rx="9" fill={c}/>
      <ellipse cx="84" cy="227" rx="22" ry="10" fill={c}/>
      <rect x="102" y="134" width="22" height="48" rx="10" fill={c}/>
      <rect x="104" y="180" width="18" height="44" rx="9" fill={c}/>
      <ellipse cx="114" cy="227" rx="22" ry="10" fill={c}/>
      {/* torso */}
      <rect x="70" y="62" width="56" height="60" rx="15" fill={c}/>
      {/* hips */}
      <rect x="72" y="118" width="52" height="22" rx="11" fill={c}/>
      {/* neck */}
      <rect x="91" y="50" width="14" height="16" rx="7" fill={c}/>
      {/* head */}
      <ellipse cx="98" cy="31" rx="20" ry="22" fill={c}/>

      {/* left arm — shoulder pivot at (70, 76), arm rect x=63,y=76,w=14,h=65,rx=7 */}
      <g>
        <rect x="63" y="76" width="14" height="64" rx="7" fill={c}/>
        {/* elbow ball */}
        <circle cx="70" cy="140" r="8" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="-90,70,76;-150,70,76;-90,70,76" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>

      {/* right arm — shoulder pivot at (126, 76) */}
      <g>
        <rect x="119" y="76" width="14" height="64" rx="7" fill={c}/>
        <circle cx="126" cy="140" r="8" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="90,126,76;150,126,76;90,126,76" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 2: YTW-RAISE — overhead / top-down prone, arms cycle Y→T→W ─────────
  if (id === 2) return (
    <svg viewBox="0 0 250 145" style={sv}>
      {/* floor/mat */}
      <rect x="10" y="125" width="230" height="10" rx="5" fill={dim} opacity="0.25"/>
      {/* legs (two parallel rects, lying down) */}
      <rect x="10" y="65" width="42" height="22" rx="10" fill={dim}/>
      <rect x="10" y="88" width="42" height="22" rx="10" fill={dim}/>
      {/* glutes / lower torso */}
      <ellipse cx="74" cy="88" rx="20" ry="22" fill={c}/>
      {/* torso (top-down, person lies head-right) */}
      <rect x="72" y="52" width="100" height="44" rx="18" fill={c}/>
      {/* head */}
      <ellipse cx="188" cy="74" rx="22" ry="20" fill={c}/>

      {/* left arm — shoulder pivot at (90, 52), arm hangs "up" in top-down = forward in real */}
      <g>
        <rect x="83" y="0" width="14" height="55" rx="7" fill={c}/>
        <circle cx="90" cy="52" r="9" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,90,52;-45,90,52;-90,90,52;-120,90,52;-90,90,52;-45,90,52;0,90,52"
          keyTimes="0;0.15;0.35;0.5;0.65;0.85;1"
          dur="3.5s" repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      </g>

      {/* right arm — shoulder pivot at (90, 96) */}
      <g>
        <rect x="83" y="96" width="14" height="55" rx="7" fill={c}/>
        <circle cx="90" cy="96" r="9" fill={c}/>

          keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>

  );

  // ── 3: BIRD DOG — side quadruped, opp. arm forward + leg back ───────────
  if (id === 3) return (
    <svg viewBox="0 0 240 165" style={sv}>
      <line x1="10" x2="230" y1="155" y2="155" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>
      {/* Support knee (front-left) */}
      <rect x="60" y="112" width="16" height="40" rx="8" fill={c}/>
      <ellipse cx="68" cy="152" rx="16" ry="8" fill={c}/>
      {/* Support knee (back-right) */}
      <rect x="152" y="112" width="16" height="40" rx="8" fill={c}/>
      <ellipse cx="160" cy="152" rx="16" ry="8" fill={c}/>
      {/* Torso (horizontal) */}
      <rect x="62" y="68" width="110" height="30" rx="13" fill={c}/>
      {/* Support arm (front-right) at the floor */}
      <rect x="62" y="96" width="16" height="32" rx="8" fill={c}/>
      <ellipse cx="70" cy="128" rx="12" ry="7" fill={c}/>
      {/* Head */}
      <ellipse cx="198" cy="76" rx="20" ry="22" fill={c}/>
      {/* Neck */}
      <rect x="177" y="64" width="16" height="18" rx="8" fill={c}/>

      {/* Animated: left arm extends forward (from down-support to forward-extend) */}
      <g>
        <rect x="152" y="70" width="16" height="46" rx="8" fill={c}/>
        <ellipse cx="160" cy="116" rx="12" ry="8" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,160,70;-95,160,70;0,160,70" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>

      {/* Animated: right leg extends back (from down to back-horizontal) */}
      <g>
        <rect x="60" y="68" width="16" height="46" rx="8" fill={c}/>
        <ellipse cx="68" cy="116" rx="12" ry="8" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,68,68;95,68,68;0,68,68" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 4: DEAD BUG — side supine, arm lowers + opp. leg extends ────────────
  if (id === 4) return (
    <svg viewBox="0 0 250 140" style={sv}>
      <line x1="10" x2="240" y1="130" y2="130" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>
      {/* head */}
      <ellipse cx="30" cy="100" rx="20" ry="21" fill={c}/>
      {/* neck */}
      <rect x="47" y="95" width="14" height="18" rx="7" fill={c}/>
      {/* torso (horizontal) */}
      <rect x="58" y="86" width="110" height="30" rx="14" fill={c}/>
      {/* static right leg (table position, bent 90°) */}
      <rect x="168" y="58" width="15" height="34" rx="7" fill={c}/>  {/* thigh up */}
      <rect x="183" y="58" width="34" height="15" rx="7" fill={c}/>  {/* shin horizontal */}
      {/* static left arm (held vertical, pointing up) */}
      <rect x="68" y="38" width="14" height="50" rx="7" fill={dim}/>
      <circle cx="75" cy="38" r="9" fill={dim}/>

      {/* animated right arm — swings from vertical down-overhead */}
      <g>
        <rect x="92" y="44" width="14" height="46" rx="7" fill={c}/>
        <circle cx="99" cy="44" r="9" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,99,90;145,99,90;0,99,90" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>

      {/* animated left leg (table position to extending straight) */}
      <g>
        <rect x="143" y="58" width="15" height="34" rx="7" fill={c}/>
        <rect x="143" y="90" width="15" height="32" rx="7" fill={c}/>
        <animateTransform attributeName="transform" type="rotate"
          values="0,151,92;55,151,92;0,151,92" dur="3s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 5: GLUTE BRIDGE — side supine, hips rise ────────────────────────────
  if (id === 5) return (
    <svg viewBox="0 0 250 148" style={sv}>
      <line x1="10" x2="240" y1="138" y2="138" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>
      {/* head (stays on floor) */}
      <ellipse cx="28" cy="108" rx="20" ry="21" fill={c}/>
      {/* upper back on floor */}
      <rect x="45" y="98" width="70" height="28" rx="13" fill={c}/>
      {/* arms flat on floor */}
      <rect x="50" y="124" width="55" height="12" rx="6" fill={dim}/>
      {/* feet on floor (static) */}
      <ellipse cx="192" cy="133" rx="22" ry="9" fill={c}/>
      <ellipse cx="216" cy="133" rx="18" ry="9" fill={dim}/>

      {/* Animated hip region: pelvis + thighs + calves rise together */}
      <g>
        {/* calves */}
        <rect x="176" y="90" width="15" height="46" rx="7" fill={c}/>
        <rect x="196" y="90" width="13" height="46" rx="7" fill={dim}/>
        {/* pelvis / seat */}
        <ellipse cx="138" cy="105" rx="28" ry="22" fill={c}/>
        {/* thighs angled */}
        <rect x="112" y="94" width="17" height="54" rx="8" fill={c}
          transform="rotate(-28,121,94)"/>
        <rect x="130" y="94" width="15" height="54" rx="7" fill={dim}
          transform="rotate(-26,138,94)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0,0;0,-32;0,0" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 6: SUPERMAN HOLD — side prone, body lifts ───────────────────────────
  if (id === 6) return (
    <svg viewBox="0 0 250 120" style={sv}>
      <line x1="10" x2="240" y1="110" y2="110" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>

      {/* Whole body lifts as one group */}
      <g>
        {/* head */}
        <ellipse cx="215" cy="78" rx="20" ry="21" fill={c}/>
        {/* neck */}
        <rect x="193" y="72" width="15" height="18" rx="7" fill={c}/>
        {/* torso */}
        <rect x="90" y="68" width="108" height="26" rx="12" fill={c}/>
        {/* buttocks */}
        <ellipse cx="90" cy="82" rx="18" ry="16" fill={c}/>
        {/* front arm extended forward */}
        <rect x="14" y="70" width="80" height="14" rx="7" fill={c}/>
        <circle cx="14" cy="77" r="9" fill={c}/>
        {/* back arm (dim) */}
        <rect x="20" y="82" width="74" height="12" rx="6" fill={dim}/>
        {/* front thigh */}
        <rect x="36" y="78" width="58" height="14" rx="7" fill={c}
          transform="rotate(-4,65,85)"/>
        {/* back thigh (dim) */}
        <rect x="40" y="88" width="54" height="12" rx="6" fill={dim}
          transform="rotate(-4,67,94)"/>
        {/* calves */}
        <rect x="14" y="80" width="26" height="12" rx="6" fill={c}
          transform="rotate(8,28,86)"/>
        <rect x="18" y="90" width="24" height="11" rx="5" fill={dim}
          transform="rotate(8,30,95)"/>

        <animateTransform attributeName="transform" type="translate"
          values="0,0;0,-20;0,0" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  // ── 7: PIKE PUSH-UP — side view inverted-V, upper body dips ─────────────
  if (id === 7) return (
    <svg viewBox="0 0 220 210" style={sv}>
      <line x1="10" x2="210" y1="200" y2="200" stroke={dim} strokeWidth="2.5" strokeDasharray="5,4"/>

      {/* Static: feet + calves + thighs (inverted-V lower half) */}
      {/* Feet */}
      <ellipse cx="108" cy="196" rx="18" ry="9" fill={c}/>
      <ellipse cx="126" cy="196" rx="15" ry="9" fill={dim}/>
      {/* Calves */}
      <rect x="100" y="152" width="16" height="48" rx="8" fill={c}/>
      <rect x="116" y="152" width="14" height="48" rx="7" fill={dim}/>
      {/* Thighs (angled for inverted-V) */}
      <rect x="98" y="96" width="17" height="62" rx="8" fill={c}
        transform="rotate(-18,107,96)"/>
      <rect x="116" y="96" width="15" height="62" rx="7" fill={dim}
        transform="rotate(-18,124,96)"/>
      {/* Hip/glutes at the peak */}
      <ellipse cx="117" cy="94" rx="22" ry="18" fill={c}/>

      {/* Animated: upper body (torso + arms + head) dips down */}
      <g>
        {/* Torso (angled, upper half of inverted-V) */}
        <rect x="72" y="54" width="50" height="28" rx="12" fill={c}
          transform="rotate(22,98,68)"/>
        {/* Shoulder area */}
        <ellipse cx="95" cy="60" rx="14" ry="10" fill={c}/>
        {/* Upper arms */}
        <rect x="48" y="52" width="14" height="48" rx="7" fill={c}
          transform="rotate(18,56,52)"/>
        <rect x="110" y="52" width="13" height="48" rx="6" fill={dim}
          transform="rotate(18,116,52)"/>
        {/* Forearms */}
        <rect x="46" y="98" width="13" height="40" rx="6" fill={c}
          transform="rotate(-16,52,98)"/>
        <rect x="108" y="98" width="12" height="40" rx="6" fill={dim}
          transform="rotate(-16,114,98)"/>
        {/* Hands on floor */}
        <ellipse cx="52" cy="194" rx="14" ry="8" fill={c}/>
        <ellipse cx="116" cy="194" rx="13" ry="8" fill={dim}/>
        {/* Head */}
        <ellipse cx="74" cy="36" rx="19" ry="21" fill={c}/>
        <rect x="84" y="54" width="13" height="15" rx="6" fill={c}/>

        <animateTransform attributeName="transform" type="translate"
          values="0,0;0,36;0,0" dur="2.5s" repeatCount="indefinite"
          calcMode="spline" keySplines={ks} keyTimes={kt}/>
      </g>
    </svg>
  );

  return null;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [weekIdx, setWeekIdx] = useState(() => Math.min(parseInt(localStorage.getItem("wk_week")||"0"),3));
  const [totalWorkouts, setTotalWorkouts] = useState(() => parseInt(localStorage.getItem("wk_total")||"0"));
  const [exIdx, setExIdx] = useState(0);
  const [setsDone, setSetsDone] = useState(0);
  const [weekUnlocked, setWeekUnlocked] = useState(false);

  const save = (t,w) => { localStorage.setItem("wk_week",String(w)); localStorage.setItem("wk_total",String(t)); };

  const startWorkout = () => { setExIdx(0); setSetsDone(0); setScreen("workout"); };

  const advance = () => {
    const prog = WEEKS[weekIdx].data[exIdx];
    if (setsDone+1 < prog.sets) {
      setSetsDone(s=>s+1);
    } else if (exIdx+1 < EX.length) {
      setExIdx(e=>e+1); setSetsDone(0);
    } else {
      const nt=totalWorkouts+1, nw=Math.min(Math.floor(nt/5),3), ul=nw>weekIdx;
      setTotalWorkouts(nt); setWeekIdx(nw); setWeekUnlocked(ul); save(nt,nw); setScreen("complete");
    }
  };

  const ex = EX[exIdx]||EX[0];
  const prog = WEEKS[weekIdx]?.data[exIdx]||WEEKS[0].data[0];
  const wkd = WEEKS[weekIdx];
  const nextIn = weekIdx<3 ? 5-(totalWorkouts%5) : null;
  const base = { minHeight:"100vh",background:"#0a0a0c",color:"#e8e6e1",fontFamily:"Georgia,serif",display:"flex",flexDirection:"column" };

  // ── HOME ──
  if (screen==="home") return (
    <div style={base}>
      <div style={{padding:"44px 22px 22px",background:"linear-gradient(180deg,#0c0f1c,#0a0a0c)"}}>
        <p style={{fontFamily:"'Courier New',monospace",fontSize:11,letterSpacing:"0.22em",color:"#2e2e4a",textTransform:"uppercase",marginBottom:8}}>Morgenroutine · Täglich · 10–15 Min</p>
        <h1 style={{fontSize:32,fontWeight:"normal",letterSpacing:"-0.5px",margin:"0 0 14px"}}>Core &amp; Haltung</h1>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"#141428",border:"1px solid #2a2a4e",borderRadius:8,padding:"6px 12px"}}>
            <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#6eb5ff"}}>{wkd.label}</span>
          </div>
          <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>{wkd.desc}</span>
        </div>
        {nextIn&&<p style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#2a2a3a",marginTop:8}}>{totalWorkouts} absolviert · Woche {weekIdx+2} in {nextIn} Training{nextIn!==1?"s":""}</p>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"4px 16px"}}>
        {EX.map((e,i)=>{const p=WEEKS[weekIdx].data[i]; return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:"1px solid #111114"}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:e.color+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{e.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,marginBottom:2}}>{e.name}</div>
              <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#3a3a52"}}>{p.sets} × {p.reps} · {p.tempo}</div>
            </div>
            {p.v!=="Basis"&&<div style={{background:e.color+"12",border:`1px solid ${e.color}28`,borderRadius:6,padding:"2px 8px",fontSize:10,color:e.color,fontFamily:"'Courier New',monospace",flexShrink:0}}>{p.v}</div>}
          </div>
        );})}
      </div>
      <div style={{padding:"16px 20px 36px"}}>
        <button onClick={startWorkout} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)",border:"none",borderRadius:12,color:"#08080a",fontSize:14,fontFamily:"'Courier New',monospace",letterSpacing:"0.1em",fontWeight:"bold",cursor:"pointer"}}>TRAINING STARTEN →</button>
      </div>
    </div>
  );

  // ── WORKOUT ──
  if (screen==="workout") return (
    <div style={{...base,padding:0}}>
      <div style={{height:3,background:"#0f0f12"}}>
        <div style={{height:"100%",width:`${((exIdx+setsDone/prog.sets)/EX.length)*100}%`,background:`linear-gradient(90deg,${ex.color},${ex.color}88)`,transition:"width 0.4s ease"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px 0"}}>
        <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>{exIdx+1} / {EX.length}</span>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#2e2e4a",fontFamily:"'Courier New',monospace",fontSize:11,cursor:"pointer",padding:"4px 8px"}}>✕ Abbrechen</button>
      </div>

      {/* Figure display */}
      <div style={{height:195,width:"100%",maxWidth:320,margin:"16px auto 0",padding:"0 20px"}}>
        <Figure id={exIdx} color={ex.color}/>
      </div>

      <div style={{padding:"10px 22px",flex:1,overflowY:"auto"}}>
        <div style={{display:"inline-block",background:ex.color+"14",border:`1px solid ${ex.color}28`,borderRadius:20,padding:"3px 12px",fontFamily:"'Courier New',monospace",fontSize:10,color:ex.color,marginBottom:10}}>{ex.cat}</div>
        <h2 style={{fontSize:26,fontWeight:"normal",letterSpacing:"-0.3px",margin:"0 0 10px"}}>{ex.emoji} {ex.name}</h2>
        {prog.v!=="Basis"&&<div style={{background:"#161400",border:"1px solid #2e2800",borderRadius:8,padding:"8px 12px",fontFamily:"'Courier New',monospace",fontSize:11,color:"#c9a22a",marginBottom:10,lineHeight:1.5}}>↑ {prog.v}{prog.h?<span style={{color:"#5a4e1a",marginLeft:6}}>{prog.h}</span>:null}</div>}
        <div style={{display:"flex",gap:5,margin:"12px 0 10px"}}>
          {Array.from({length:prog.sets}).map((_,i)=>(
            <div key={i} style={{height:4,flex:1,borderRadius:2,background:i<setsDone?ex.color:i===setsDone?ex.color+"50":"#161618",transition:"background 0.3s"}}/>
          ))}
        </div>
        <div style={{fontFamily:"'Courier New',monospace",fontSize:13,color:ex.color,marginBottom:12}}>Satz {setsDone+1} von {prog.sets} · {prog.reps} Wdh. · {prog.tempo}</div>
        <p style={{fontSize:14,lineHeight:1.7,color:"#7a7888",marginBottom:10}}>{ex.desc}</p>
        <div style={{background:"#0e0e11",borderLeft:`3px solid ${ex.color}35`,borderRadius:"0 8px 8px 0",padding:"10px 14px",fontSize:13,color:"#50505e",fontStyle:"italic",lineHeight:1.55}}>{ex.tip}</div>
      </div>

      <div style={{padding:"14px 20px 34px"}}>
        <button onClick={advance} style={{width:"100%",padding:"15px",background:ex.color,border:"none",borderRadius:12,color:"#08080a",fontSize:13,fontFamily:"'Courier New',monospace",letterSpacing:"0.08em",fontWeight:"bold",cursor:"pointer"}}>
          {setsDone+1<prog.sets?`SATZ ${setsDone+1} ERLEDIGT →`:exIdx+1<EX.length?"ÜBUNG ABGESCHLOSSEN →":"WORKOUT ABGESCHLOSSEN ✓"}
        </button>
      </div>
    </div>
  );

  // ── COMPLETE ──
  return (
    <div style={{...base,alignItems:"center",justifyContent:"center",padding:28,textAlign:"center"}}>
      <div style={{fontSize:52,marginBottom:14,lineHeight:1}}>✓</div>
      <h1 style={{fontSize:26,fontWeight:"normal",margin:"0 0 6px"}}>Workout abgeschlossen</h1>
      <p style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a",marginBottom:28}}>{totalWorkouts} Training{totalWorkouts!==1?"s":""} insgesamt</p>
      {weekUnlocked&&weekIdx<=3&&(
        <div style={{background:"#091409",border:"1px solid #142814",borderRadius:12,padding:"16px 22px",marginBottom:22,width:"100%",maxWidth:320}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#3a6e3a",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Neue Stufe freigeschaltet</div>
          <div style={{fontSize:16,color:"#86efac",marginBottom:4}}>{WEEKS[weekIdx].label}</div>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#3a5a3a"}}>{WEEKS[weekIdx].desc}</div>
        </div>
      )}
      <div style={{background:"#0e0e11",border:"1px solid #161618",borderRadius:12,padding:"16px 20px",width:"100%",maxWidth:320,marginBottom:24,textAlign:"left"}}>
        <div style={{fontFamily:"'Courier New',monospace",fontSize:10,color:"#2a2a3a",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Aktuell</div>
        <div style={{fontSize:14,color:"#888",marginBottom:4}}>{WEEKS[weekIdx].label} · {WEEKS[weekIdx].desc}</div>
        {nextIn?<div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>Woche {weekIdx+2} in {nextIn} Training{nextIn!==1?"s":""}</div>:<div style={{fontFamily:"'Courier New',monospace",fontSize:11,color:"#2e2e4a"}}>Maximum erreicht 🏆</div>}
      </div>
      <button onClick={()=>setScreen("home")} style={{padding:"14px 36px",background:"linear-gradient(135deg,#6eb5ff,#4ecdc4)",border:"none",borderRadius:12,color:"#08080a",fontSize:12,fontFamily:"'Courier New',monospace",letterSpacing:"0.1em",fontWeight:"bold",cursor:"pointer"}}>ZUR ÜBERSICHT</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}</script>
</body>
</html>
